<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Add Product</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>
<body class="bg-light d-flex justify-content-center align-items-center vh-100">

  <div class="card shadow p-4" style="width: 400px;">
    <h3 class="mb-3 text-center text-primary">Add New Product</h3>
    <form id="productForm">
      <input class="form-control mb-2" id="name" placeholder="Product Name" required />
      <input class="form-control mb-2" id="category" placeholder="Category" required />
      <input class="form-control mb-2" type="number" id="price" placeholder="Price" step="0.01" required />
      <input class="form-control mb-2" type="number" id="quantity" placeholder="Quantity" required />
      <textarea class="form-control mb-2" id="description" placeholder="Description (optional)"></textarea>
      <button class="btn btn-primary w-100" type="submit">Add Product</button>
    </form>
    <p id="message" class="text-center mt-3"></p>
  </div>

  <script>
    document.getElementById("productForm").addEventListener("submit", async function (e) {
      e.preventDefault();

      const name = document.getElementById("name").value.trim();
      const category = document.getElementById("category").value.trim();
      const price = parseFloat(document.getElementById("price").value);
      const quantity = parseInt(document.getElementById("quantity").value);
      const description = document.getElementById("description").value.trim();

      const message = document.getElementById("message");

      try {
        const res = await fetch("http://localhost:3000/api/sell/sell", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ name, category, price, quantity, description }),
        });

        const data = await res.json();

        if (res.ok) {
          message.textContent = data.message;
          message.className = "text-success";
          this.reset();
        } else {
          message.textContent = data.message || "Failed to add product.";
          message.className = "text-danger";
        }
      } catch (err) {
        message.textContent = "Server error!";
        message.className = "text-danger";
      }
    });
  </script>
</body>
</html>
