<!-- buy.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Buy Product</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>
<body class="bg-light d-flex justify-content-center align-items-center vh-100">

  <div class="card shadow p-4" style="width: 400px;">
    <h3 class="mb-3 text-center text-success">Buy Product</h3>
    <form id="buyForm">
      <select class="form-select mb-2" id="productId" required></select>
      <input class="form-control mb-2" type="number" id="quantity" placeholder="Quantity to Buy" required />
      <button class="btn btn-success w-100" type="submit">Buy</button>
    </form>
    <p id="message" class="text-center mt-3"></p>
  </div>

  <script>
  const productSelect = document.getElementById("productId");

  // ✅ Load products from /api/products/all
  async function loadProducts() {
    try {
      const res = await fetch("http://localhost:3000/api/buy/all");
      const products = await res.json();

      productSelect.innerHTML = ""; // Clear old list
      products.forEach(p => {
        const option = document.createElement("option");
        option.value = p._id;
        option.textContent = `${p.name} - (${p.quantity} in stock)`;
        productSelect.appendChild(option);
      });
    } catch (err) {
      alert("Failed to load products.");
    }
  }

  loadProducts();

  // ✅ Handle Buy Form
  document.getElementById("buyForm").addEventListener("submit", async function (e) {
    e.preventDefault();

    const productId = productSelect.value;
    const quantity = parseInt(document.getElementById("quantity").value);
    const message = document.getElementById("message");

    try {
      const res = await fetch("http://localhost:3000/api/buy/buy", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ productId, quantity })
      });

      const data = await res.json();

      if (res.ok) {
        message.textContent = data.message;
        message.className = "text-success";
        await loadProducts(); // Reload product list after buy
      } else {
        message.textContent = data.message;
        message.className = "text-danger";
      }
    } catch (err) {
      message.textContent = "Server error!";
      message.className = "text-danger";
    }
  });
</script>

</body>
</html>
