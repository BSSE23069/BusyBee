<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sign In</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />

  <style>
    body {
      background: #f9fafb;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    .card {
      width: 100%;
      max-width: 420px;
      border: none;
      border-radius: 15px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
      overflow: hidden;
    }

    .card-header {
      background-color: #ffc107;
      color: #212529;
      font-size: 1.5rem;
      font-weight: 600;
      text-align: center;
      padding: 1.5rem 1rem;
    }

    .card-body {
      padding: 2rem;
      background-color: #fff;
    }

    .form-control {
      border-radius: 8px;
      padding: 0.75rem;
      font-size: 1rem;
    }

    .form-control:focus {
      box-shadow: 0 0 0 0.2rem rgba(255, 193, 7, 0.25);
      border-color: #ffc107;
    }

    .btn-custom {
      background-color: #ffc107;
      border: none;
      padding: 0.75rem;
      font-weight: bold;
      border-radius: 8px;
      transition: background-color 0.3s ease;
    }

    .btn-custom:hover {
      background-color: #e0a800;
    }

    #message {
      font-size: 0.95rem;
      margin-top: 1rem;
      font-weight: 500;
    }

    .link-text {
      text-align: center;
      margin-top: 1rem;
      font-size: 0.95rem;
    }

    .link-text a {
      color: #ffc107;
      text-decoration: none;
      font-weight: 500;
    }

    .link-text a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="card-header">
      Welcome Back
    </div>
    <div class="card-body">
      <form id="signinForm">
         <div class="mb-3" >
          <select name="user" id="user">
            <option value="buyer">buyer</option>
             <option value="seller">Seller</option>
          </select>
        </div>
        <div class="mb-3">
          <input type="email" id="email" class="form-control" placeholder="Email Address" required />
        </div>
       
        <div class="mb-3">
          <input type="password" id="password" class="form-control" placeholder="Password" required />
        </div>
        <button type="submit" class="btn btn-custom w-100">Sign In</button>
        <p id="message" class="text-center"></p>
      </form>
      <div class="link-text">
        Don’t have an account? <a href="signup.html">Sign Up</a>
      </div>
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    document.getElementById("signinForm").addEventListener("submit", async function (e) {
      e.preventDefault();
const usertype = document.getElementById("user").value.trim();
      
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();
      const messageElem = document.getElementById("message");

      try {
        const res = await fetch("http://localhost:3000/api/auth/signin", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password }),
        });

        const data = await res.json();

        if (res.ok) {
          messageElem.textContent = data.message || "Login successful!";
          messageElem.className = "text-success text-center";
          this.reset();
          if (usertype.toLowerCase() === "seller") {
  window.location.href = "sell.html"; // Go to seller's dashboard/page
} else if (usertype.toLowerCase() === "buyer") {
  window.location.href = "buy.html"; // Go to buyer's page (where they view sellers/products)
}

        } else {
          messageElem.textContent = data.message || "Invalid email or password.";
          messageElem.className = "text-danger text-center";
        }
      } catch (error) {
        messageElem.textContent = "Server error. Please try again later.";
        messageElem.className = "text-danger text-center";
      }
    });
  </script>

</body>
</html>
